<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Andrea</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container keeping everything in a straight row line */
        #text-container {
            display: flex;
            gap: 8px; /* Spacing between words */
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* Allows text to wrap neatly on mobile phones */
            max-width: 80%;
            text-align: center;
        }

        /* Style for each single word */
        .word {
            color: #ff4d6d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 28px; /* Bigger size since it's a straight line statement */
            font-weight: bold;
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff1a43;
            user-select: none;
            
            /* Animation properties */
            opacity: 0;
            transform: translateY(10px);
            animation: revealWord 1.2s forwards cubic-bezier(0.11, 0, 0, 1);
        }

        /* Smooth fade-in and float-up animation */
        @keyframes revealWord {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div id="text-container"></div>

    <script>
        const container = document.getElementById('text-container');
        const fullMessage = "You are the best dad in the whole world, and I love you so much!";
        
        // Split the sentence into individual words
        const wordsArray = fullMessage.split(" ");

        wordsArray.forEach((wordText, index) => {
            const span = document.createElement('span');
            span.className = 'word';
            span.innerText = wordText;

            // Stagger the delay so each word pops up right after the previous one
            span.style.animationDelay = `${index * 0.2}s`;

            // Alternate neon colors slightly for visual style
            if (index % 3 === 0) {
                span.style.color = '#ff758f';
                span.style.textShadow = '0 0 12px #ff758f, 0 0 25px #ff4d6d';
            }

            container.appendChild(span);
        });
    </script>
</body>
</html>
